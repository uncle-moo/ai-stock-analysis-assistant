name: 涨停热点分布

on:
  schedule:
    # 北京时间 15:30 (UTC 7:30), 周一至周五（A股15:00收盘）
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      - run: npx tsx src/limit-up-analysis.ts
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}

      - name: 提交涨停热点分布 HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/limit-up-*.html
          if git diff --staged --quiet; then
            echo "no changes to commit"
          else
            git commit -m "update limit-up heatmap [skip ci]"
            git push
          fi
